<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Command | Daily & Team Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712; --card: #0f172a; --primary: #38bdf8; --pa: #0ea5e9; --qa: #8b5cf6;
            --success: #10b981; --text: #f8fafc; --text-dim: #64748b; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1800px; margin: 0 auto; }
        
        .master-nav { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 30px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); }
        .coverage-badge { font-size: 0.75rem; background: rgba(56, 189, 248, 0.1); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border); color: var(--primary); }

        .control-bar { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .pill-group { display: flex; background: #1e293b; padding: 5px; border-radius: 12px; gap: 5px; }
        .pill { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; color: var(--text-dim); font-weight: 800; font-size: 0.75rem; transition: 0.2s; background: transparent; }
        .pill.active { background: var(--primary); color: #000; }
        
        input[type="date"] { background: #1e293b; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 8px; outline: none; }
        .viewing-label { font-weight: 700; color: var(--success); font-size: 0.9rem; }

        .table-wrap { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 20px; background: rgba(255,255,255,0.03); color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .uti-lg { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 5px 0; }
        .prog-stack { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin: 12px 0; display: flex; }

        .bottom-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding-top: 30px; border-top: 2px solid var(--border); }
        .hall-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        .hidden { display: none; }
        #dropZone { border: 2px dashed var(--border); background: var(--card); padding: 100px; text-align: center; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="master-nav">
        <div class="logo">UTILIZATION<span>COMMAND</span></div>
        <div class="coverage-badge" id="coverageInfo">Waiting for File...</div>
    </div>

    <div id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx">
        <h1>DROP DATA TO INITIALIZE</h1>
        <p style="color:var(--text-dim)">Click to browse your export</p>
    </div>

    <div id="dashUI" class="hidden">
        <div class="control-bar">
            <div class="filter-row">
                <div class="pill-group">
                    <button class="pill" id="btn-day" onclick="setMode('day', this)">DAILY</button>
                    <button class="pill active" onclick="setMode('week', this)">THIS WEEK</button>
                    <button class="pill" onclick="setMode('month', this)">THIS MONTH</button>
                    <button class="pill" onclick="setMode('quarter', this)">THIS QUARTER</button>
                    <button class="pill" onclick="setMode('all', this)">SHOW ALL</button>
                </div>

                <div style="display:flex; gap:10px; align-items:center;">
                    <span id="datePickLabel" style="font-size:0.7rem; color:var(--text-dim)">SELECT:</span>
                    <input type="date" id="startIn"> <span id="toDateLabel">to</span> <input type="date" id="endIn">
                    <button onclick="applyCustom()" style="background:var(--primary); border:none; padding:5px 15px; border-radius:6px; cursor:pointer; font-weight:800;">GO</button>
                </div>

                <div class="viewing-label" id="selectionLabel">Current Week</div>
            </div>
        </div>

        <!-- TABLE TOP -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Member</th><th>Tickets</th><th>PA-1</th><th>PA-2</th><th>QA-1</th><th>QA-2</th><th>Target Mins</th><th>Total Mins</th><th>Util %</th><th>Gap</th></tr>
                </thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>

        <!-- CARDS MIDDLE -->
        <div class="card-grid" id="teamCards"></div>

        <!-- STATS BOTTOM -->
        <div class="bottom-stats">
            <div class="hall-card"><h3>UTILIZATION KING</h3><div id="topUti" class="uti-lg">-</div></div>
            <div class="hall-card"><h3>VOLUME LEADER</h3><div id="topTkts" class="uti-lg">-</div></div>
            <div class="hall-card"><h3>TEAM PULSE</h3><div id="teamPulse" class="uti-lg">0%</div></div>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let curMode = 'week';
    const DAY_MINS = 420;

    function setMode(mode, btn) {
        document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        curMode = mode;
        
        // UI Adjustments for Daily Mode
        const toLabel = document.getElementById('toDateLabel');
        const endInput = document.getElementById('endIn');
        const startInput = document.getElementById('startIn');
        const pickLabel = document.getElementById('datePickLabel');

        if(mode === 'day') {
            toLabel.style.display = 'none';
            endInput.style.display = 'none';
            pickLabel.innerText = "SELECT DAY:";
            // Default to today
            if(!startInput.value) startInput.valueAsDate = new Date();
        } else {
            toLabel.style.display = 'inline';
            endInput.style.display = 'inline';
            pickLabel.innerText = "CUSTOM RANGE:";
        }

        process();
    }

    function applyCustom() {
        if(curMode !== 'day') curMode = 'custom';
        process();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
            rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            analyzeFile();
            document.getElementById('dashUI').classList.remove('hidden');
            document.getElementById('dropZone').classList.add('hidden');
            process();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function analyzeFile() {
        const dates = rawData.map(r => new Date(r['PIO (Completed)'] || r['PIO (Submitted)'])).filter(d => !isNaN(d));
        if(!dates.length) return;
        const min = new Date(Math.min(...dates));
        const max = new Date(Math.max(...dates));
        document.getElementById('coverageInfo').innerText = `DATA RANGE: ${min.toLocaleDateString()} - ${max.toLocaleDateString()}`;
    }

    function process() {
        if (!rawData.length) return;
        const now = new Date();
        let start, end;

        if (curMode === 'day') {
            start = new Date(document.getElementById('startIn').value);
            start.setHours(0,0,0,0);
            end = new Date(start);
            end.setHours(23,59,59,999);
        } else if (curMode === 'week') {
            start = new Date(now); start.setDate(now.getDate() - (now.getDay() - 1));
            end = new Date(start); end.setDate(start.getDate() + 4);
        } else if (curMode === 'month') {
            start = new Date(now.getFullYear(), now.getMonth(), 1);
            end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        } else if (curMode === 'quarter') {
            const q = Math.floor(now.getMonth() / 3);
            start = new Date(now.getFullYear(), q * 3, 1);
            end = new Date(now.getFullYear(), (q + 1) * 3, 0);
        } else if (curMode === 'custom') {
            start = new Date(document.getElementById('startIn').value);
            end = new Date(document.getElementById('endIn').value);
        } else {
            start = null; end = null;
        }

        const workDays = start ? getWorkDays(start, end) : 252;
        const target = workDays * DAY_MINS;
        
        document.getElementById('selectionLabel').innerText = start ? 
            (curMode === 'day' ? `Viewing Day: ${start.toLocaleDateString()}` : `${start.toLocaleDateString()} - ${end.toLocaleDateString()} (${workDays} Days)`) 
            : "Showing All Tickets in File";

        const members = {};
        let totalGlobalMins = 0;

        rawData.forEach(row => {
            const clean = {}; Object.keys(row).forEach(k => clean[k.trim().toLowerCase().replace(/[^a-z0-9]/g,'')] = row[k]);
            if (String(clean.piostatus).toLowerCase() !== 'completed') return;
            const d = new Date(clean.piocompleted);
            
            if (!start || (d >= start && d <= end)) {
                const rowMins = (parseFloat(clean.pa1min)||0) + (parseFloat(clean.pa2min)||0) + (parseFloat(clean.qa1min)||0) + (parseFloat(clean.qa2min)||0);
                totalGlobalMins += rowMins;

                [['pa1','pa1min'],['pa2','pa2min'],['qa1','qa1min'],['qa2','qa2min']].forEach(([nk, mk]) => {
                    const name = row[Object.keys(row).find(k => k.toLowerCase().replace(/[^a-z0-9]/g,'') === nk)];
                    const m = parseFloat(row[Object.keys(row).find(k => k.toLowerCase().replace(/[^a-z0-9]/g,'') === mk)]) || 0;
                    if (name && isNaN(name) && m > 0) {
                        if (!members[name]) members[name] = { pa:0, qa:0, tot:0, tkts:0, pa1:0, pa2:0, qa1:0, qa2:0 };
                        if (nk.startsWith('pa')) members[name].pa += m; else members[name].qa += m;
                        members[name][nk] += m; members[name].tot += m; members[name].tkts++;
                    }
                });
            }
        });

        render(members, target, totalGlobalMins);
    }

    function render(members, target, globalTotal) {
        const tBody = document.getElementById('teamBody'); tBody.innerHTML = '';
        const tGrid = document.getElementById('teamCards'); tGrid.innerHTML = '';
        const sorted = Object.keys(members).sort((a,b) => members[b].tot - members[a].tot);

        sorted.forEach(m => {
            const u = members[m]; const p = Math.round((u.tot / target) * 100);
            tBody.innerHTML += `<tr><td><strong>${m}</strong></td><td>${u.tkts}</td><td>${u.pa1}m</td><td>${u.pa2}m</td><td>${u.qa1}m</td><td>${u.qa2}m</td><td>${target}m</td><td>${u.tot}m</td><td style="color:var(--primary); font-weight:800">${p}%</td><td>${target-u.tot<=0?0:target-u.tot}m</td></tr>`;
            tGrid.innerHTML += `<div class="card"><div style="font-weight:700">${m}</div><div class="uti-lg">${p}%</div><div class="prog-stack"><div style="width:${(u.pa/u.tot)*100}%; background:var(--pa)"></div><div style="width:${(u.qa/u.tot)*100}%; background:var(--qa)"></div></div><div style="display:flex; justify-content:space-between; font-size:0.6rem; font-weight:700"><span>PA: ${u.pa}m</span><span>QA: ${u.qa}m</span></div><div style="font-size:0.6rem; color:var(--text-dim); margin-top:5px">Target: ${target}m</div></div>`;
        });

        if (sorted.length) {
            document.getElementById('topUti').innerText = sorted[0] + " (" + Math.round((members[sorted[0]].tot/target)*100) + "%)";
            const bestV = Object.keys(members).sort((a,b) => members[b].tkts - members[a].tkts)[0];
            document.getElementById('topTkts').innerText = bestV + " (" + members[bestV].tkts + " TKTS)";
            document.getElementById('teamPulse').innerText = Math.round((globalTotal / (sorted.length * target)) * 100) + "% TOTAL";
        }
    }

    function getWorkDays(s, e) {
        if(curMode === 'day') return 1; // Always 1 day target for daily mode
        let count = 0; let cur = new Date(s);
        while(cur <= e) { if(cur.getDay() !== 0 && cur.getDay() !== 6) count++; cur.setDate(cur.getDate()+1); }
        return count || 1;
    }
</script>
</body>
</html>
